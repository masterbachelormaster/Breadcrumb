name: Breadcrumb
options:
  bundleIdPrefix: com.roger
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"
settings:
  SWIFT_VERSION: "6.0"
targets:
  Breadcrumb:
    type: application
    platform: macOS
    sources: [Breadcrumb]
    info:
      path: Breadcrumb/Info.plist
      properties:
        LSUIElement: true
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        CFBundleDisplayName: Breadcrumb
        CFBundleIconFile: ""
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSMicrophoneUsageDescription: "Breadcrumb uses the microphone for speech-to-text in status updates."
        NSSpeechRecognitionUsageDescription: "Breadcrumb uses speech recognition to transcribe your status updates."
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.roger.breadcrumb
      MARKETING_VERSION: "0.6.1"
      CURRENT_PROJECT_VERSION: "10"
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  BreadcrumbTests:
    type: bundle.unit-test
    platform: macOS
    sources: [BreadcrumbTests]
    dependencies:
      - target: Breadcrumb
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.roger.breadcrumb-tests
      GENERATE_INFOPLIST_FILE: YES
